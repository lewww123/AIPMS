{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AIPMS | Edit Farmer</title>

    <link rel="stylesheet" href="{% static 'css/lgu.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .edit-card {
            max-width: 650px;
            margin: 0 auto;
        }

        .farm-dropdown {
            position: relative;
            width: 100%;
            margin-bottom: 10px;
        }

        .farm-dropdown-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #fff;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #334155;
        }

        .farm-dropdown-btn:hover {
            border-color: #16a34a;
        }

        .farm-dropdown-menu {
            display: none;
            position: absolute;
            width: 100%;
            max-height: 220px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            margin-top: 5px;
            z-index: 20;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .farm-dropdown-menu.show {
            display: block;
        }

        .farm-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .farm-option:hover {
            background: #f0fdf4;
        }

        .farm-option input {
            width: auto;
        }

        .farm-help-text {
            display: block;
            margin-top: 6px;
            margin-bottom: 15px;
            color: #64748b;
            font-size: 13px;
        }

        .no-farm-text {
            padding: 12px;
            color: #64748b;
            font-size: 14px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .form-actions button,
        .form-actions a {
            flex: 1;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="panel edit-card">
        <h2>
            <i class="fas fa-user-edit"></i> Edit Farmer
        </h2>

        <form method="POST">
            {% csrf_token %}

            <label>Full Name</label>
            <input type="text" name="full_name" value="{{ farmer.full_name }}" required>

            <label>Contact Number</label>
            <input type="text" name="contact_number" value="{{ farmer.contact_number }}">

            <label>Address</label>
            <textarea name="address">{{ farmer.address }}</textarea>

            <hr style="margin:15px 0; border:none; border-top:1px solid #e2e8f0;">

            <h3 class="section-title">
                <i class="fas fa-tractor"></i> Farm Assignment
            </h3>

            <label>Assign to Farm/s</label>

            <div class="farm-dropdown">
                <button type="button" class="farm-dropdown-btn" id="farmDropdownBtn">
                    <span id="selectedFarmText">Select farm/s</span>
                    <i class="fas fa-chevron-down"></i>
                </button>

                <div class="farm-dropdown-menu" id="farmDropdownMenu">
                    {% for farm in farms %}
                        <label class="farm-option">
                            <input
                                type="checkbox"
                                name="farms"
                                value="{{ farm.id }}"
                                class="farm-checkbox"
                                {% if farm.id in assigned_farm_ids %}checked{% endif %}
                            >
                            <span>{{ farm.name }} - {{ farm.location }}</span>
                        </label>
                    {% empty %}
                        <div class="no-farm-text">
                            No farms available. Add a farm first.
                        </div>
                    {% endfor %}
                </div>
            </div>

            <small class="farm-help-text">
                You can assign this farmer to one or more farms.
            </small>

            <div class="form-actions">
                <button type="submit">
                    <i class="fas fa-save"></i> Save Changes
                </button>

                <a href="{% url 'lgu_farmers' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>

</div>

<script>
    const dropdownBtn = document.getElementById("farmDropdownBtn");
    const dropdownMenu = document.getElementById("farmDropdownMenu");
    const selectedFarmText = document.getElementById("selectedFarmText");
    const checkboxes = document.querySelectorAll(".farm-checkbox");

    function updateSelectedFarmText() {
        const selected = document.querySelectorAll(".farm-checkbox:checked");

        if (selected.length === 0) {
            selectedFarmText.textContent = "Select farm/s";
        } else if (selected.length === 1) {
            selectedFarmText.textContent = selected[0].nextElementSibling.textContent.trim();
        } else {
            selectedFarmText.textContent = selected.length + " farms selected";
        }
    }

    dropdownBtn.addEventListener("click", function () {
        dropdownMenu.classList.toggle("show");
    });

    checkboxes.forEach(function (checkbox) {
        checkbox.addEventListener("change", updateSelectedFarmText);
    });

    document.addEventListener("click", function (event) {
        if (!event.target.closest(".farm-dropdown")) {
            dropdownMenu.classList.remove("show");
        }
    });

    updateSelectedFarmText();
</script>

</body>
</html>
